<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Blog | Abrar Faiyaz, PhD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap');

        /* --- CSS Variables matched to the "Dimension" Dark Theme --- */
        :root {
            --bg-main: #111316; 
            --bg-sidebar: rgba(17, 19, 22, 0.85);
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-main: rgba(255, 255, 255, 0.65);
            --text-heading: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.15);
            --border-hover: rgba(255, 255, 255, 0.35);
            --sidebar-width: 320px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans Pro', Helvetica, sans-serif;
            font-weight: 300;
            line-height: 2;
            color: var(--text-main);
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, #1a1d24, #0d0f12);
            background-attachment: fixed;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width); background-color: var(--bg-sidebar); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid var(--border); position: fixed; height: 100vh; padding: 3.5rem 2.5rem; z-index: 100;
        }

        .profile-name { font-size: 1.25rem; color: var(--text-heading); font-weight: 600; text-align: center; text-transform: uppercase; letter-spacing: 0.15rem; }
        .profile-title { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 3rem; letter-spacing: 0.1rem; }
        
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .nav-links a { 
            text-decoration: none; color: var(--text-main); font-weight: 400; display: flex; align-items: center; 
            padding: 0.75rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.1rem; font-size: 0.85rem; 
            transition: all 0.2s ease; border: 1px solid transparent;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-heading); border-color: var(--border-hover); background-color: rgba(255, 255, 255, 0.02); }
        .nav-links svg { width: 16px; height: 16px; margin-right: 15px; }

        /* --- Mobile Header --- */
        .mobile-header {
            display: none; position: fixed; top: 0; left: 0; right: 0; height: 60px;
            background: var(--bg-sidebar); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            z-index: 101; align-items: center; padding: 0 1.5rem; justify-content: space-between;
        }
        .menu-btn { background: none; border: none; cursor: pointer; color: var(--text-heading); }

        /* --- Main Content Area --- */
        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 5rem 4rem; max-width: 1100px; }
        .page-header { margin-bottom: 3rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .page-header h1 { font-size: 2.25rem; color: var(--text-heading); letter-spacing: 0.2rem; text-transform: uppercase; font-weight: 600; margin-bottom: 0.5rem; }

        /* --- Collapsible Accordion Cards --- */
        .post-card { background: var(--bg-card); border: 1px solid var(--border); margin-bottom: 1.5rem; transition: var(--transition); }
        .post-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
        .post-header { padding: 2rem 2.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.3s ease; }
        .post-title-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .post-title { font-size: 1.4rem; font-weight: 600; color: var(--text-heading); margin: 0; letter-spacing: 0.1rem; text-transform: uppercase; }
        .post-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 15px; text-transform: uppercase; letter-spacing: 0.1rem; }
        .expand-icon { width: 24px; height: 24px; color: var(--text-muted); transition: transform 0.4s ease; }

        /* Animation Logic */
        .post-content-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .post-content-inner { overflow: hidden; padding: 0 2.5rem; opacity: 0; transition: opacity 0.4s ease, padding 0.4s ease; }

        .post-card.active { border-color: var(--border-hover); background: rgba(0,0,0,0.2); }
        .post-card.active .post-content-wrapper { grid-template-rows: 1fr; }
        .post-card.active .post-content-inner { padding: 0 2.5rem 2.5rem 2.5rem; opacity: 1; }
        .post-card.active .expand-icon { transform: rotate(180deg); color: var(--text-heading); }
        .post-card.active .post-header { border-bottom: 1px solid var(--border); background: transparent; }

        /* --- Injected Content Global Styling --- */
        .post-content-inner h2 { font-size: 1.4rem; color: var(--text-heading); margin: 3.5rem 0 1.5rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .post-content-inner h3 { font-size: 1.1rem; color: var(--text-heading); margin: 2rem 0 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1rem; }
        .post-content-inner p { margin-bottom: 1.5rem; font-size: 1.05rem; }
        .loading-text { color: var(--text-muted); font-style: italic; padding: 3rem 0; text-align: center; letter-spacing: 0.1rem; }

        /* Callouts & Cards inside injected HTML */
        .post-content-inner .callout, .post-content-inner .highlight-box { background-color: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--text-heading); padding: 1.5rem 2rem; margin: 2.5rem 0; }
        .post-content-inner .highlight-box { border-left-color: var(--text-muted); font-style: italic; }
        .post-content-inner .structure-container { display: flex; flex-direction: column; gap: 3rem; margin: 3rem 0; }
        .post-content-inner .structure-card { display: flex; flex-direction: column; border: 1px solid var(--border); background: var(--bg-card); }
        @media (min-width: 850px) {
            .post-content-inner .structure-card { flex-direction: row; }
            .post-content-inner .structure-outline { width: 40%; border-right: 1px solid var(--border); border-bottom: none; }
            .post-content-inner .structure-details { width: 60%; }
        }
        .post-content-inner .structure-outline { padding: 2.5rem; border-bottom: 1px solid var(--border); }
        .post-content-inner .structure-details { padding: 2.5rem; display: flex; flex-direction: column; justify-content: flex-start; }
        .post-content-inner .tag { display: inline-block; border: 1px solid var(--border); color: var(--text-heading); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15rem; padding: 0.25rem 0.75rem; margin-bottom: 1.5rem; align-self: flex-start; }
        
        /* Lists */
        .post-content-inner .structure-outline ul, .post-content-inner .custom-list { list-style: none; padding-left: 0; margin-bottom: 0; }
        .post-content-inner .structure-outline ul li { position: relative; padding-left: 1.5rem; margin-bottom: 0.25rem; font-size: 0.95rem; color: var(--text-heading); }
        .post-content-inner .structure-outline ul li::before { content: ''; position: absolute; left: 0; top: 14px; width: 8px; height: 1px; background: var(--text-muted); }
        .post-content-inner .structure-outline ul ul { margin-top: 0.25rem; margin-bottom: 0.75rem; }
        .post-content-inner .structure-outline ul ul li { color: var(--text-main); font-size: 0.9rem; padding-left: 2.5rem; }
        .post-content-inner .structure-outline ul ul li::before { left: 1rem; width: 6px; }
        .post-content-inner .custom-list li { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; font-size: 1.05rem; color: var(--text-main); }
        .post-content-inner .custom-list li::before { content: '>'; position: absolute; left: 0; top: 0; color: var(--text-heading); font-weight: 600; width: auto; height: auto; background: transparent; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar { transform: translateX(-100%); padding-top: 80px; transition: transform 0.3s ease; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 6rem 1.5rem 3rem; }
            .post-header { padding: 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; position: relative;}
            .expand-icon { position: absolute; right: 1.5rem; top: 1.5rem; }
            .post-content-inner { padding: 0 1.5rem; }
            .post-card.active .post-content-inner { padding: 0 1.5rem 1.5rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div style="font-weight: 600; color: var(--text-heading); text-transform: uppercase; letter-spacing: 0.1rem; font-size: 0.9rem;">Abrar Faiyaz, PhD</div>
        <button class="menu-btn" id="menuToggle">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="profile-name">Abrar Faiyaz</div>
        <div class="profile-title">Ph.D. Researcher</div>
        <nav>
            <ul class="nav-links">
                <li><a href="https://abrarfaiyaz.github.io/cv/">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Home / CV
                </a></li>
                <li><a href="#" class="active">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H14"></path></svg>
                    Research Blog
                </a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Research Log</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Click on any post to expand and read.</p>
        </div>

        <div id="blog-container"></div>
    </main>

    <script>
        // Global object to store the pre-loaded HTML content
        const preloadedArticles = {};

        // Mobile Sidebar Logic
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // The Auto-Discovery Function
        async function discoverAndLoadBlogs() {
            const container = document.getElementById('blog-container');
            container.innerHTML = '<div class="loading-text">Scanning directory for research logs...</div>';
            
            let index = 1;
            let keepLooking = true;
            let cardsHTML = '';

            while (keepLooking) {
                const postId = `post-${index}`;
                const fileUrl = `blogposts/blog-${index}.html`;

                try {
                    const response = await fetch(fileUrl);

                    // If we hit a 404 (file doesn't exist), we stop the loop
                    if (!response.ok) {
                        keepLooking = false;
                        break; 
                    }

                    // If it does exist, we scrape it!
                    const htmlText = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlText, 'text/html');

                    // 1. Scrape Title
                    const titleEl = doc.querySelector('article h1');
                    const title = titleEl ? titleEl.innerText : `Research Log #${index}`;

                    // 2. Scrape Date (Looking for the • divider in our template)
                    const headerDiv = doc.querySelector('article header div');
                    let date = "Recent";
                    if (headerDiv && headerDiv.innerText.includes('•')) {
                        date = headerDiv.innerText.split('•')[1].trim(); 
                    }

                    // 3. Pre-load the content so it opens instantly later
                    const articleContent = doc.querySelector('article');
                    if (articleContent) {
                        // Clean up redundant headers/buttons for the accordion view
                        const innerHeader = articleContent.querySelector('header');
                        if (innerHeader) innerHeader.remove();
                        const backBtn = articleContent.querySelector('.btn');
                        if(backBtn) backBtn.parentElement.remove();
                        
                        preloadedArticles[postId] = articleContent.innerHTML;
                    }

                    // 4. Build the card HTML
                    cardsHTML += `
                        <div class="post-card" id="${postId}">
                            <div class="post-header" onclick="togglePost('${postId}')">
                                <div class="post-title-group">
                                    <h2 class="post-title">${title}</h2>
                                    <div class="post-meta">
                                        <span>${date}</span>
                                    </div>
                                </div>
                                <svg class="expand-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </div>
                            <div class="post-content-wrapper">
                                <div class="post-content-inner" id="content-${postId}">
                                    ${preloadedArticles[postId] || '<div class="loading-text" style="color:#ef4444;">Error parsing article content.</div>'}
                                </div>
                            </div>
                        </div>
                    `;

                    index++; // Move to check blog-2, then blog-3, etc.

                } catch (error) {
                    console.error("Discovery stopped due to network error/CORS:", error);
                    keepLooking = false;
                }
            }

            // Finally, inject all the discovered cards into the page
            if (cardsHTML === '') {
                container.innerHTML = `
                    <div class="loading-text" style="color:var(--text-heading);">
                        <strong style="color:#ef4444;">System Warning:</strong> No blog files were discovered.<br><br>
                        <span style="font-size:0.9rem;">(Ensure your files are named exactly 'blog-1.html', 'blog-2.html', etc., and are placed in the 'blogposts' folder. Note: This script requires a local server or GitHub Pages to run successfully; it will be blocked by CORS if you just double-click the file on your computer.)</span>
                    </div>`;
            } else {
                container.innerHTML = cardsHTML;
            }
        }

        // Toggle function (now ultra-fast because content is preloaded)
        function togglePost(postId) {
            const card = document.getElementById(postId);
            
            // Optional: Close other open cards (Accordion style)
            // document.querySelectorAll('.post-card.active').forEach(c => {
            //    if (c.id !== postId) c.classList.remove('active');
            // });

            card.classList.toggle('active');
        }

        // Start the discovery process when the page loads
        document.addEventListener('DOMContentLoaded', discoverAndLoadBlogs);
    </script>
</body>
</html>
